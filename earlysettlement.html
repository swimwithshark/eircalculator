<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Effective Interest Rate (EIR) Calculator</title>
    <style>
        :root {
            --primary-color: #0f172a;
            --accent-color: #3b82f6;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --border-color: #e2e8f0;
            --text-main: #334155;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 800px;
            width: 100%;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        h1 {
            color: var(--primary-color);
            text-align: center;
            margin-top: 0;
            font-size: 1.5rem;
        }

        .input-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
        }

        .full-width {
            grid-column: 1 / -1;
            flex-direction: row;
            align-items: center;
            gap: 10px;
            background: #f1f5f9;
            padding: 12px 15px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
        }

        .early-inputs {
            background: #f8fafc;
            padding: 15px;
            border-radius: 6px;
            border: 1px dashed var(--accent-color);
            margin-bottom: 30px;
            display: none; /* Hidden by default */
        }

        label {
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        .full-width label {
            margin-bottom: 0;
            cursor: pointer;
        }

        input[type="number"] {
            padding: 10px 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 1rem;
            transition: border-color 0.2s;
        }

        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        input:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .result-box {
            background-color: #eff6ff;
            border: 1px solid #bfdbfe;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            margin-bottom: 30px;
        }

        .result-title {
            font-size: 1rem;
            color: #1e3a8a;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .eir-value {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--accent-color);
            margin: 0;
        }

        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }

        th, td {
            padding: 12px;
            text-align: right;
            border-bottom: 1px solid var(--border-color);
        }

        th {
            background-color: var(--primary-color);
            color: white;
            font-weight: 600;
            position: sticky;
            top: 0;
        }

        th:first-child, td:first-child {
            text-align: center;
        }

        tr:nth-child(even) {
            background-color: #f8fafc;
        }

        tr:hover {
            background-color: #f1f5f9;
        }

        .error-message {
            color: #ef4444;
            text-align: center;
            font-weight: 600;
            margin-bottom: 20px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>True Cost Web Calculator</h1>
        
        <div class="input-grid">
            <div class="input-group">
                <label for="loanAmount">Initial Loan Amount</label>
                <input type="number" id="loanAmount" value="100000" min="1" step="1000">
            </div>
            <div class="input-group">
                <label for="tenure">Original Tenure (Months)</label>
                <input type="number" id="tenure" value="60" min="1" step="1">
            </div>
            <div class="input-group">
                <label for="monthlyRepayment">Monthly Repayment</label>
                <input type="number" id="monthlyRepayment" value="1915.83" min="1" step="0.01">
            </div>
        </div>

        <div class="input-group full-width">
            <input type="checkbox" id="isEarlySettlement">
            <label for="isEarlySettlement">Include Early Settlement</label>
        </div>

        <div class="input-grid early-inputs" id="earlySettlementContainer">
            <div class="input-group">
                <label for="settlementMonth">Settlement Month (T)</label>
                <input type="number" id="settlementMonth" value="24" min="1" step="1">
            </div>
            <div class="input-group">
                <label for="settlementAmount">Final Settlement Amount</label>
                <input type="number" id="settlementAmount" value="65000" min="1" step="0.01">
            </div>
        </div>

        <div id="errorMsg" class="error-message">Invalid inputs or settlement data!</div>

        <div class="result-box">
            <div class="result-title">Effective Interest Rate (Annualized)</div>
            <div class="eir-value" id="eirDisplay">0.00%</div>
        </div>

        <div class="table-container">
            <table id="amortizationTable">
                <thead>
                    <tr>
                        <th>Month</th>
                        <th>Beginning Balance</th>
                        <th>Total Repayment</th>
                        <th>Interest Paid</th>
                        <th>Principal Paid</th>
                        <th>Ending Balance</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        // DOM Elements
        const loanAmountInput = document.getElementById('loanAmount');
        const tenureInput = document.getElementById('tenure');
        const monthlyRepaymentInput = document.getElementById('monthlyRepayment');
        
        const isEarlySettlementCheckbox = document.getElementById('isEarlySettlement');
        const earlySettlementContainer = document.getElementById('earlySettlementContainer');
        const settlementMonthInput = document.getElementById('settlementMonth');
        const settlementAmountInput = document.getElementById('settlementAmount');

        const eirDisplay = document.getElementById('eirDisplay');
        const tableBody = document.getElementById('tableBody');
        const errorMsg = document.getElementById('errorMsg');

        // Number formatter
        const formatCurrency = (num) => {
            return parseFloat(num).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        };

        // Toggle early settlement visibility
        isEarlySettlementCheckbox.addEventListener('change', (e) => {
            if(e.target.checked) {
                earlySettlementContainer.style.display = 'grid';
                // Ensure settlement month max is not greater than original tenure
                settlementMonthInput.max = tenureInput.value;
            } else {
                earlySettlementContainer.style.display = 'none';
            }
            updateCalculator();
        });

        // Bisection method to find the internal monthly rate (handles both standard and early settlement)
        function calculateMonthlyRate(principal, pmt, months, isEarly, settleMonth, settleAmt) {
            let low = 0.0;
            let high = 1.0; 
            let rate = 0.0;
            const tolerance = 1e-6; 

            for (let i = 0; i < 100; i++) { 
                rate = (low + high) / 2;
                let presentValue = 0;

                if (isEarly) {
                    // PV of regular monthly payments up to month T-1
                    if (settleMonth > 1) {
                        presentValue += pmt * ((1 - Math.pow(1 + rate, -(settleMonth - 1))) / rate);
                    }
                    // PV of the final lump sum paid in month T
                    presentValue += settleAmt / Math.pow(1 + rate, settleMonth);
                } else {
                    // Standard PV of Annuity
                    presentValue = pmt * ((1 - Math.pow(1 + rate, -months)) / rate);
                }
                
                if (Math.abs(presentValue - principal) < tolerance) {
                    break;
                } else if (presentValue > principal) {
                    low = rate; 
                } else {
                    high = rate; 
                }
            }
            return rate;
        }

        function updateCalculator() {
            const principal = parseFloat(loanAmountInput.value);
            const months = parseInt(tenureInput.value);
            const pmt = parseFloat(monthlyRepaymentInput.value);
            
            const isEarly = isEarlySettlementCheckbox.checked;
            const settleMonth = parseInt(settlementMonthInput.value);
            const settleAmt = parseFloat(settlementAmountInput.value);

            // Basic validation
            if (!principal || !months || !pmt || (isEarly && (!settleMonth || !settleAmt || settleMonth > months))) {
                errorMsg.style.display = 'block';
                eirDisplay.innerText = "N/A";
                tableBody.innerHTML = "";
                return;
            }

            errorMsg.style.display = 'none';

            // 1. Calculate EIR
            const monthlyRate = calculateMonthlyRate(principal, pmt, months, isEarly, settleMonth, settleAmt);
            const annualEIR = monthlyRate * 12 * 100;
            eirDisplay.innerText = annualEIR.toFixed(2) + "%";

            // 2. Generate Amortization Table
            tableBody.innerHTML = "";
            let balance = principal;
            
            // Determine how many rows to generate
            const activeMonths = isEarly ? settleMonth : months;

            for (let i = 1; i <= activeMonths; i++) {
                // Determine the payment amount for the current month
                let currentPayment = (isEarly && i === settleMonth) ? settleAmt : pmt;
                
                let interestForMonth = balance * monthlyRate;
                let principalForMonth = currentPayment - interestForMonth;

                // Adjust the final month to zero out the balance smoothly
                if (i === activeMonths) {
                    principalForMonth = balance;
                    interestForMonth = currentPayment - principalForMonth;
                }

                let endingBalance = balance - principalForMonth;
                if (endingBalance < 0.01) endingBalance = 0;

                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${i}</td>
                    <td>${formatCurrency(balance)}</td>
                    <td>${formatCurrency(currentPayment)}</td>
                    <td>${formatCurrency(interestForMonth)}</td>
                    <td>${formatCurrency(principalForMonth)}</td>
                    <td>${formatCurrency(endingBalance)}</td>
                `;
                tableBody.appendChild(row);

                balance = endingBalance;
            }
        }

        // Add event listeners to all inputs
        loanAmountInput.addEventListener('input', updateCalculator);
        tenureInput.addEventListener('input', updateCalculator);
        monthlyRepaymentInput.addEventListener('input', updateCalculator);
        settlementMonthInput.addEventListener('input', updateCalculator);
        settlementAmountInput.addEventListener('input', updateCalculator);

        // Initial calculation on load
        updateCalculator();
    </script>
</body>
</html>
